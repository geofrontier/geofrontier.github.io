<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraction Simulator</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<section class="section">

  <!-- Left: Simulation & Graph -->
  <div>
    <h1>Extraction Simulator</h1>

    <div class="card">
      <h2>Simulation Controls</h2>

      <label>Quarry Sites:</label>
      <select id="quarryCount">
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
      </select>

      <br>
      <label>Mining Outposts:</label>
      <select id="outpostCount">
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
      </select>

      <br>
      <button class="btn" onclick="simulate()">Simulate</button>
    </div>

    <div class="card">
      <h2>Ore Chart</h2>
      <canvas id="oreChart"></canvas>
    </div>
  </div>

  <!-- Right: Editable Config -->
  <div>
    <div class="card">
      <h2>Edit Config</h2>
      <p>Change the numbers and prices below. Simulation uses these values.</p>

      <!-- Quarry Config -->
      <div class="card">
        <h3>Quarry Config</h3>
        <label>Cycle Time (seconds):</label>
        <input type="number" id="quarryCycle" value="600"><br>

        <label>RAW_IRON Min/Max:</label>
        <input type="number" id="quarryIronMin" value="4" style="width:50px"> /
        <input type="number" id="quarryIronMax" value="12" style="width:50px"><br>

        <label>COAL Min/Max:</label>
        <input type="number" id="quarryCoalMin" value="8" style="width:50px"> /
        <input type="number" id="quarryCoalMax" value="16" style="width:50px"><br>

        <label>RAW_GOLD Min/Max:</label>
        <input type="number" id="quarryGoldMin" value="1" style="width:50px"> /
        <input type="number" id="quarryGoldMax" value="4" style="width:50px"><br>

        <label>Prices ($):</label><br>
        COAL: <input type="number" id="quarryCoalPrice" value="22" style="width:60px"><br>
        RAW_GOLD: <input type="number" id="quarryGoldPrice" value="22" style="width:60px"><br>
      </div>

      <!-- Mining Outpost Config -->
      <div class="card" style="margin-top:20px">
        <h3>Mining Outpost Config</h3>
        <label>Cycle Time (seconds):</label>
        <input type="number" id="outpostCycle" value="900"><br>

        <label>RAW_IRON Min/Max:</label>
        <input type="number" id="outpostIronMin" value="8" style="width:50px"> /
        <input type="number" id="outpostIronMax" value="20" style="width:50px"><br>

        <label>COAL Min/Max:</label>
        <input type="number" id="outpostCoalMin" value="12" style="width:50px"> /
        <input type="number" id="outpostCoalMax" value="24" style="width:50px"><br>

        <label>RAW_GOLD Min/Max:</label>
        <input type="number" id="outpostGoldMin" value="2" style="width:50px"> /
        <input type="number" id="outpostGoldMax" value="8" style="width:50px"><br>

        <label>REDSTONE Min/Max:</label>
        <input type="number" id="outpostRedMin" value="2" style="width:50px"> /
        <input type="number" id="outpostRedMax" value="6" style="width:50px"><br>

        <label>LAPIS Min/Max:</label>
        <input type="number" id="outpostLapisMin" value="1" style="width:50px"> /
        <input type="number" id="outpostLapisMax" value="4" style="width:50px"><br>

        <label>DIAMOND Min/Max:</label>
        <input type="number" id="outpostDiamondMin" value="0" style="width:50px"> /
        <input type="number" id="outpostDiamondMax" value="1" style="width:50px"><br>

        <label>EMERALD Min/Max:</label>
        <input type="number" id="outpostEmeraldMin" value="0" style="width:50px"> /
        <input type="number" id="outpostEmeraldMax" value="1" style="width:50px"><br>

        <label>Prices ($):</label><br>
        COAL: <input type="number" id="outpostCoalPrice" value="22" style="width:60px"><br>
        RAW_GOLD: <input type="number" id="outpostGoldPrice" value="22" style="width:60px"><br>
        REDSTONE: <input type="number" id="outpostRedPrice" value="7.5" style="width:60px"><br>
        LAPIS_LAZULI: <input type="number" id="outpostLapisPrice" value="7.5" style="width:60px"><br>
        DIAMOND: <input type="number" id="outpostDiamondPrice" value="50" style="width:60px"><br>
        EMERALD: <input type="number" id="outpostEmeraldPrice" value="22" style="width:60px"><br>
      </div>
    </div>
  </div>
</section>

<script>
let chart;

function simulate() {
  const quarryCount = parseInt(document.getElementById('quarryCount').value);
  const outpostCount = parseInt(document.getElementById('outpostCount').value);

  const siteData = [
    { name:'Quarry', count: quarryCount, cycleSec: parseFloat(document.getElementById('quarryCycle').value), ores:[
      {name:'RAW_IRON', min: parseFloat(document.getElementById('quarryIronMin').value), max: parseFloat(document.getElementById('quarryIronMax').value), price:0},
      {name:'COAL', min: parseFloat(document.getElementById('quarryCoalMin').value), max: parseFloat(document.getElementById('quarryCoalMax').value), price: parseFloat(document.getElementById('quarryCoalPrice').value)},
      {name:'RAW_GOLD', min: parseFloat(document.getElementById('quarryGoldMin').value), max: parseFloat(document.getElementById('quarryGoldMax').value), price: parseFloat(document.getElementById('quarryGoldPrice').value)}
    ]},
    { name:'Mining Outpost', count: outpostCount, cycleSec: parseFloat(document.getElementById('outpostCycle').value), ores:[
      {name:'RAW_IRON', min: parseFloat(document.getElementById('outpostIronMin').value), max: parseFloat(document.getElementById('outpostIronMax').value), price:0},
      {name:'COAL', min: parseFloat(document.getElementById('outpostCoalMin').value), max: parseFloat(document.getElementById('outpostCoalMax').value), price: parseFloat(document.getElementById('outpostCoalPrice').value)},
      {name:'RAW_GOLD', min: parseFloat(document.getElementById('outpostGoldMin').value), max: parseFloat(document.getElementById('outpostGoldMax').value), price: parseFloat(document.getElementById('outpostGoldPrice').value)},
      {name:'REDSTONE', min: parseFloat(document.getElementById('outpostRedMin').value), max: parseFloat(document.getElementById('outpostRedMax').value), price: parseFloat(document.getElementById('outpostRedPrice').value)},
      {name:'LAPIS_LAZULI', min: parseFloat(document.getElementById('outpostLapisMin').value), max: parseFloat(document.getElementById('outpostLapisMax').value), price: parseFloat(document.getElementById('outpostLapisPrice').value)},
      {name:'DIAMOND', min: parseFloat(document.getElementById('outpostDiamondMin').value), max: parseFloat(document.getElementById('outpostDiamondMax').value), price: parseFloat(document.getElementById('outpostDiamondPrice').value)},
      {name:'EMERALD', min: parseFloat(document.getElementById('outpostEmeraldMin').value), max: parseFloat(document.getElementById('outpostEmeraldMax').value), price: parseFloat(document.getElementById('outpostEmeraldPrice').value)}
    ]}
  ];

  const labels = [];
  const minValues = [];
  const maxValues = [];
  const avgValues = [];

  let totalMin = 0, totalMax=0, totalAvg=0;

  siteData.forEach(site=>{
    if(site.count===0) return;
    const cyclesPerHour = 3600 / site.cycleSec;
    site.ores.forEach(ore=>{
      const oreMin = ore.min * cyclesPerHour * site.count;
      const oreMax = ore.max * cyclesPerHour * site.count;
      const oreAvg = ((ore.min+ore.max)/2) * cyclesPerHour * site.count;

      labels.push(`${site.name} - ${ore.name}`);
      minValues.push(oreMin);
      maxValues.push(oreMax);
      avgValues.push(oreAvg);

      totalMin += oreMin*ore.price;
      totalMax += oreMax*ore.price;
      totalAvg += oreAvg*ore.price;
    });
  });

  const ctx = document.getElementById('oreChart').getContext('2d');
  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: labels,
      datasets:[
        {label:'Min Ore/hr', data:minValues, backgroundColor:'rgba(54, 162, 235, 0.5)'},
        {label:'Max Ore/hr', data:maxValues, backgroundColor:'rgba(255, 99, 132, 0.5)'},
        {label:'Avg Ore/hr', data:avgValues, backgroundColor:'rgba(75, 192, 192, 0.5)'}
      ]
    },
    options:{
      responsive:true,
      plugins:{
        title:{display:true, text:'Ore Production & Value Simulation'},
        tooltip:{
          callbacks:{
            afterBody:()=>`Estimated $ range: $${totalMin.toFixed(2)} - $${totalMax.toFixed(2)}, Avg $${totalAvg.toFixed(2)}`
          }
        }
      },
      scales:{y:{beginAtZero:true, title:{display:true,text:'Ore Count'}}}
    }
  });
}
</script>

</body>
</html>
