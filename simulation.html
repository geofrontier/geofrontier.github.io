<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraction Simulator</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<section class="section">
  <!-- Left: Simulation & Graph -->
  <div>
    <h1>Extraction Simulator</h1>

    <div class="card">
      <h2>Simulation Controls</h2>

      <label>Quarry Sites:</label>
      <select id="quarryCount">
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
      </select>

      <br>
      <label>Mining Outposts:</label>
      <select id="outpostCount">
        <option value="0">0</option><option value="1">1</option>
        <option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
      </select>

      <br>
      <button class="btn" onclick="simulate()">Simulate</button>
    </div>

    <div class="card">
      <h2>Ore Chart</h2>
      <canvas id="oreChart"></canvas>
    </div>
  </div>

  <!-- Right: Editable Config -->
  <div>
    <div class="card">
      <h2>Edit Extraction Config</h2>
      <p>Modify numbers and prices below, then click "Simulate" to see effects.</p>
      <textarea id="configEditor" style="width:100%; height:500px; background:#1e293b; color:#f1f5f9; border-radius:12px; padding:10px;">
{
  "quarry": {
    "cycleMinutes": 10,
    "ores": {
      "RAW_IRON": [4,12],
      "COAL": [8,16],
      "RAW_COPPER": [4,10],
      "RAW_GOLD": [1,4]
    },
    "prices": { "COAL":22, "RAW_GOLD":22, "RAW_IRON":0, "RAW_COPPER":0 }
  },
  "mining_outpost": {
    "cycleMinutes": 15,
    "ores": {
      "RAW_IRON": [8,20],
      "COAL": [12,24],
      "RAW_COPPER": [6,15],
      "RAW_GOLD": [2,8],
      "REDSTONE":[2,6],
      "LAPIS_LAZULI":[1,4],
      "DIAMOND":[0,1],
      "EMERALD":[0,1]
    },
    "prices": { 
      "COAL":22, "RAW_GOLD":22, "REDSTONE":7.5, "LAPIS_LAZULI":7.5,
      "DIAMOND":50, "EMERALD":22, "RAW_IRON":0, "RAW_COPPER":0
    }
  }
}
      </textarea>
    </div>
  </div>
</section>

<script>
let chart;

function simulate() {
  let config;
  try {
    config = JSON.parse(document.getElementById('configEditor').value);
  } catch(e) {
    alert("Invalid JSON in config editor!");
    return;
  }

  const quarrySites = parseInt(document.getElementById('quarryCount').value);
  const outpostSites = parseInt(document.getElementById('outpostCount').value);

  const siteData = [
    { name: "Quarry", config: config.quarry, count: quarrySites },
    { name: "Mining Outpost", config: config.mining_outpost, count: outpostSites }
  ];

  const labels = [];
  const minValues = [];
  const maxValues = [];
  const avgValues = [];

  let totalMin = 0;
  let totalMax = 0;
  let totalAvg = 0;

  for (const site of siteData) {
    if (site.count === 0) continue;

    const cyclesPerHour = 60 / site.config.cycleMinutes;
    const ores = site.config.ores;
    const prices = site.config.prices;

    for (let ore in ores) {
      const [min, max] = ores[ore];
      const oreMin = min * cyclesPerHour * site.count;
      const oreMax = max * cyclesPerHour * site.count;
      const oreAvg = ((min + max)/2) * cyclesPerHour * site.count;

      labels.push(`${site.name} - ${ore}`);
      minValues.push(oreMin);
      maxValues.push(oreMax);
      avgValues.push(oreAvg);

      const price = prices[ore] || 0;
      totalMin += oreMin * price;
      totalMax += oreMax * price;
      totalAvg += oreAvg * price;
    }
  }

  const ctx = document.getElementById('oreChart').getContext('2d');
  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Min Ore/hr', data: minValues, backgroundColor: 'rgba(54, 162, 235, 0.5)' },
        { label: 'Max Ore/hr', data: maxValues, backgroundColor: 'rgba(255, 99, 132, 0.5)' },
        { label: 'Avg Ore/hr', data: avgValues, backgroundColor: 'rgba(75, 192, 192, 0.5)' }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        title: { display:true, text:'Ore Production & Value Simulation' },
        tooltip: {
          callbacks: {
            afterBody: function() {
              return `Estimated $ range: $${totalMin.toFixed(2)} - $${totalMax.toFixed(2)}, Avg $${totalAvg.toFixed(2)}`;
            }
          }
        }
      },
      scales: { y: { beginAtZero:true, title:{display:true, text:'Ore Count'} } }
    }
  });
}
</script>

</body>
</html>
